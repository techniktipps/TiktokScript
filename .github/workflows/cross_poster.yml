name: TikTok Cross-Poster Automation

on:
  schedule:
    # Führt den Workflow alle 30 Minuten aus
    - cron: '*/30 * * * *'
  workflow_dispatch:
    # Ermöglicht manuelles Starten über das GitHub-UI

jobs:
  cross-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Automatische Cache-Funktion für schnellere Builds

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Cross-Poster Script
        env:
          # TikTok Config
          TIKTOK_USERNAME: ${{ secrets.TIKTOK_USERNAME }}
          
          # Supabase Config (Reiner Duplikatschutz, kein Bucket mehr nötig)
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          
          # YouTube API Config
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          
          # Instagram Config (Neu über den cleveren Session-Trick)
          INSTAGRAM_SESSION: ${{ secrets.INSTAGRAM_SESSION }}
        run: python main.py